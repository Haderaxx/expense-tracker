version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: expense-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: expense-manager

  backend:
    build: ./backend
    container_name: expense-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/expense-manager
      JWT_SECRET: change_this_to_a_secure_secret_in_production
      NODE_ENV: production
      CLIENT_URL: http://localhost:3000
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: expense-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
