services:
  backend:
    build: ./backend
    container_name: expense-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
    expose:
      - "5000"

  frontend:
    build: ./frontend
    container_name: expense-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
